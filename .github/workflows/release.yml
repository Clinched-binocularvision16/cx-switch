name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: 构建 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - name: Linux-X64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: cx-switch
            archive_name: cx-switch-Linux-X64.tar.gz
            archive_type: tar.gz

          # macOS Intel
          - name: macOS-X64
            os: macos-latest
            target: x86_64-apple-darwin
            binary_name: cx-switch
            archive_name: cx-switch-macOS-X64.tar.gz
            archive_type: tar.gz

          # macOS Apple Silicon (M系列)
          - name: macOS-ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            binary_name: cx-switch
            archive_name: cx-switch-macOS-ARM64.tar.gz
            archive_type: tar.gz

          # Windows x86_64
          - name: Windows-X64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: cx-switch.exe
            archive_name: cx-switch-Windows-X64.zip
            archive_type: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: 编译 Release 二进制
        run: cargo build --release --target ${{ matrix.target }}

      - name: 打包产物 (tar.gz)
        if: matrix.archive_type == 'tar.gz'
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" staging/
          cd staging
          tar -czf "../${{ matrix.archive_name }}" "${{ matrix.binary_name }}"

      - name: 打包产物 (zip)
        if: matrix.archive_type == 'zip'
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" staging/
          cd staging
          7z a "../${{ matrix.archive_name }}" "${{ matrix.binary_name }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: 生成 Release Notes
        id: release_notes
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)

          echo "## Changelog" > release-notes.md
          echo "" >> release-notes.md

          if [ -n "${PREVIOUS_TAG}" ]; then
            echo "Full Changelog: [\`${PREVIOUS_TAG}...${CURRENT_TAG}\`](https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG})" >> release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}...${CURRENT_TAG}" >> release-notes.md
          else
            echo "Full Changelog: [\`${CURRENT_TAG}\`](https://github.com/${{ github.repository }}/commits/${CURRENT_TAG})" >> release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" >> release-notes.md
          fi

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: release-notes.md
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
